<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Scribbling using OpenCV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="landing-container">
    <div class="overlay"></div>
    <div class="landing-content">
      <div class="left-section">
        <div class="image-box">
          <div class="image-stack">
            <img src="{{ url_for('static', filename='images/hand.jpg') }}" alt="Hand tracking with markers">
            <img src="{{ url_for('static', filename='images/recognized_text.jpg') }}" alt="Recognized text display">
            <img src="{{ url_for('static', filename='images/neon_scribble.jpg') }}" alt="Neon air scribble effect">
            <img src="{{ url_for('static', filename='images/scribbling.jpeg') }}" alt="Scribbling">
            <img src="{{ url_for('static', filename='images/screen.png') }}" alt="Screen">
            <img src="{{ url_for('static', filename='images/last.jpg') }}" alt="Last">
          </div>
        </div>
      </div>
      <div class="right-section">
        <h1>Air Scribbling using OpenCV</h1>
        <p>Draw in the air and watch your scribbles come to life with real-time text recognition!</p>
        <a href="{{ url_for('index') }}" class="start-button">Start Scribbling</a>
      </div>
    </div>
  </div>
</body>
</html>
